apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # Infrastructure tools
  - ../../components/external-secrets   # Foundation: Vault → K8s
  - ../../components/cert-manager       # TLS certificate controller
  - ../../components/external-dns       # Auto DNS record management
  - ../../components/reloader           # Auto-reload on secret changes
  - ../../components/ingress-nginx      # HTTP ingress controller
  - ../../components/certs              # TLS cert lifecycle + push to Vault

  # Cluster-specific TLS certificates
  - certs/                              # Certificate resources for this cluster

patches:
  # Patch external-dns with this cluster's unique owner ID (avoids DNS conflicts)
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --txt-owner-id=my-cluster
    target:
      kind: Deployment
      name: external-dns

  # Patch external-dns to only watch a specific namespace
  - patch: |-
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --namespace=my-app-namespace
    target:
      kind: Deployment
      name: external-dns

  # Patch the CronJob to mount the cluster's TLS cert secrets into the uploader
  - patch: |-
      - op: add
        path: /spec/jobTemplate/spec/template/spec/containers/0/volumeMounts
        value:
          - name: my-kafka-cluster-tls
            mountPath: /certs/my-kafka-cluster
            readOnly: true
    target:
      kind: CronJob
      name: push-certs-to-vault

  - patch: |-
      - op: add
        path: /spec/jobTemplate/spec/template/spec/volumes
        value:
          - name: my-kafka-cluster-tls
            secret:
              secretName: my-kafka-cluster-tls
    target:
      kind: CronJob
      name: push-certs-to-vault