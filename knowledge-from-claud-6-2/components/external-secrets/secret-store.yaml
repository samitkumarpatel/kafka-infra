# SecretStore tells ExternalSecrets Operator HOW to connect to Vault
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-secret-store
  namespace: external-secrets
spec:
  provider:
    vault:
      server: "https://vault.example.com"       # Your Vault URL
      path: "secret"                             # KV mount path
      version: "v2"
      auth:
        kubernetes:
          mountPath: "kubernetes"
          role: "my-cluster-role"                # Vault role for this cluster
          serviceAccountRef:
            name: external-secrets-sa